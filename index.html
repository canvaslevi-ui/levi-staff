<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Levi Interior</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

:root {
  --primary:#2563eb;
  --accent:#06b6d4;
  --surface:#ffffff;
  --separator:#e2e8f0;
  --text-primary:#0f172a;
  --muted:#64748b;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'SF Pro Display',sans-serif;
  background:linear-gradient(180deg,#e0e7ff 0%,#fff 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.app-container{
  width:100%;
  max-width:460px;
  background:var(--surface);
  border-radius:32px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  border:1px solid var(--separator);
  padding:40px 20px;
  text-align:center;
}

/* LOGO */
.logo{
  width:120px;
  height:120px;
  border-radius:28px;
  object-fit:cover;
  margin-top:20px;
}

h1{
  font-size:28px;
  margin-top:20px;
  font-weight:700;
}

.subtitle{
  color:var(--muted);
  margin-bottom:20px;
}

/* USER NAME */
.user-name{
  font-weight:600;
  margin-bottom:20px;
  color:#2563eb;
}

/* BUTTON GRID */
.button-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.btn{
  border:1px solid var(--separator);
  background:linear-gradient(145deg,#f9f9ff,#edf2ff);
  border-radius:20px;
  padding:22px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* LOGOUT */
.logout{
  margin-top:20px;
  background:#ef4444;
  color:white;
}

/* Footer */
footer{
  margin-top:30px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>

<div class="app-container">

  <img src="https://i.imgur.com/284Ol04.jpeg" class="logo">

  <h1>Levi Interior</h1>
  <div class="subtitle">Staff Management</div>

  <!-- USER -->
  <div id="userName" class="user-name"></div>

  <!-- BUTTONS -->
  <div class="button-grid">
    <button class="btn" onclick="go('attendance.html')">📋 Attendance</button>
    <button class="btn" onclick="go('info.html')">📊 Info</button>
    <button class="btn" onclick="go('leave.html')">📝 Leave</button>
    <button class="btn" onclick="go('payment.html')">💰 Payment</button>
  </div>

  <!-- LOGOUT -->
  <button class="btn logout" onclick="logout()">Logout</button>

  <footer>© Levi Interior</footer>

</div>

<script>
/* 🔐 LOGIN CHECK */
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user){
  window.location.href = "login.html";
}

/* SHOW NAME */
document.getElementById("userName").innerText = "👋 " + user.name;

/* NAV */
function go(page){
  window.location.href = page;
}

/* LOGOUT */
function logout(){
  sessionStorage.removeItem("user");
  window.location.href = "login.html";
}
</script>

</body>
</html>
