<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Levi Interior</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

:root{
  --primary:#2563eb;
  --accent:#06b6d4;
  --surface:#ffffff;
  --separator:#e2e8f0;
  --text-primary:#0f172a;
  --muted:#64748b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'SF Pro Display',sans-serif;
  background:linear-gradient(180deg,#e0e7ff 0%,#fff 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:15px;
}

.app-container{
  width:100%;
  max-width:460px;
  background:var(--surface);
  border-radius:32px;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
  border:1px solid var(--separator);
  padding:35px 20px;
  text-align:center;
}

.logo{
  width:120px;
  height:120px;
  border-radius:28px;
  object-fit:cover;
}

h1{
  font-size:28px;
  margin-top:18px;
  font-weight:700;
}

.subtitle{
  color:var(--muted);
  margin-top:6px;
}

.user-name{
  font-weight:600;
  margin:18px 0;
  color:#2563eb;
  font-size:17px;
}

.button-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:10px;
}

.btn{
  border:1px solid var(--separator);
  background:linear-gradient(145deg,#f9f9ff,#edf2ff);
  border-radius:20px;
  padding:22px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  font-size:15px;
}

.btn:hover{
  transform:scale(1.04);
}

.logout{
  margin-top:20px;
  width:100%;
  background:#ef4444;
  color:#fff;
}

footer{
  margin-top:28px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>

<div class="app-container">

<img src="https://i.imgur.com/284Ol04.jpeg" class="logo">

<h1>Levi Interior</h1>
<div class="subtitle">Staff Management</div>

<div id="userName" class="user-name"></div>

<div class="button-grid">
  <button class="btn" onclick="go('attendance.html')">📋 Attendance</button>
  <button class="btn" onclick="go('info.html')">📊 Info</button>
  <button class="btn" onclick="go('leave.html')">📝 Leave</button>
  <button class="btn" onclick="go('payment.html')">💰 Payment</button>
</div>

<button class="btn logout" onclick="logout()">Logout</button>

<footer>© Levi Interior</footer>

</div>

<script>
/* LOGIN CHECK WITH 7 DAYS */
let user = localStorage.getItem("user");
let loginTime = localStorage.getItem("loginTime");

if(!user || !loginTime){
  location.href="login.html";
}

let diff = Date.now() - Number(loginTime);
let sevenDays = 7 * 24 * 60 * 60 * 1000;

if(diff > sevenDays){
  localStorage.removeItem("user");
  localStorage.removeItem("loginTime");
  location.href="login.html";
}

user = JSON.parse(user);

/* SHOW USER NAME */
document.getElementById("userName").innerText = "👋 " + user.name;

/* NAVIGATION */
function go(page){
  location.href = page;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  localStorage.removeItem("loginTime");
  location.href="login.html";
}
</script>

</body>
</html>
