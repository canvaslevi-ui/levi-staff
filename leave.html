<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Coming Soon</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#eef2ff,#ffffff);
padding:20px;
}

.box{
background:#fff;
padding:28px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
max-width:420px;
width:100%;
}

h1{
font-size:28px;
margin-bottom:10px;
color:#111827;
}

p{
font-size:17px;
color:#6b7280;
line-height:1.6;
margin-bottom:18px;
}

.name{
color:#5b5cf0;
font-weight:700;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#5b5cf0;
color:#fff;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>🚀 Coming Soon</h1>
<p>
Hello <span class="name" id="uname">User</span><br>
This feature will be available soon.
</p>

<button onclick="history.back()">Go Back</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user") || "{}");
document.getElementById("uname").innerText = user.name || "User";
</script>

</body>
</html>
