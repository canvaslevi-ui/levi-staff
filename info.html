<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Levi Staff</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f1f5f9;
}

/* MOBILE NAV */
.nav{
  display:flex;
  background:#fff;
  position:sticky;
  top:0;
}
.nav div{
  flex:1;
  padding:12px;
  text-align:center;
  font-weight:600;
  border-bottom:2px solid transparent;
  cursor:pointer;
}
.nav div.active{
  border-bottom:2px solid #6366f1;
  color:#6366f1;
}

.main{
  padding:15px;
}

.section{display:none}

.card{
  background:#fff;
  padding:12px;
  border-radius:14px;
  margin:10px 0;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:#fff;
  margin-top:10px;
}

.input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.filter button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:10px;
  background:#e0e7ff;
}
.filter button.active{
  background:#6366f1;
  color:#fff;
}

/* STATUS */
.green{color:#16a34a;font-weight:bold;}
.red{color:#dc2626;font-weight:bold;}
.yellow{color:#ca8a04;font-weight:bold;}
</style>
</head>

<body>

<div class="nav">
<div onclick="show('att',this)">📋</div>
<div onclick="show('req',this)">📨</div>
<div onclick="show('adv',this)">💰</div>
<div onclick="show('salary',this)">💵</div>
</div>

<div class="main">

<!-- ATTENDANCE -->
<div id="att" class="section">
<h3>Attendance</h3>

<div class="filter">
<button onclick="loadAttendance('today',this)">Today</button>
<button onclick="loadAttendance('week',this)">Week</button>
<button onclick="loadAttendance('lastweek',this)">Last Week</button>
<button onclick="loadAttendance('month',this)">Month</button>
<button onclick="loadAttendance('lastmonth',this)">Last Month</button>
</div>

<div id="attList"></div>
</div>

<!-- REQUEST -->
<div id="req" class="section">

<button onclick="toggleReq('pay')">Payment</button>
<button onclick="toggleReq('leave')">Leave</button>

<div id="payBox">
<input id="payAmount" class="input" placeholder="Amount">
<input id="payReason" class="input" placeholder="Reason">
<button class="btn" onclick="sendPayment()">Submit</button>
</div>

<div id="leaveBox" style="display:none">
<input id="leaveFrom" type="date" class="input">
<input id="leaveTo" type="date" class="input">
<input id="leaveReason" class="input" placeholder="Reason">
<button class="btn" onclick="sendLeave()">Submit</button>
</div>

</div>

<!-- ADVANCE -->
<div id="adv" class="section">
<h3>Advance</h3>
<div id="advList"></div>
</div>

<!-- SALARY -->
<div id="salary" class="section">
<h3>Salary</h3>
<div id="salaryBox"></div>
<div id="salaryHistory"></div>
</div>

</div>

<script>
const API="https://levi-api-zhbu.onrender.com";
const user = JSON.parse(sessionStorage.getItem("user"));

/* NAV */
function show(id,el){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.querySelectorAll('.nav div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
document.getElementById(id).style.display='block';

if(id==="att") loadAttendance("today");
if(id==="adv") loadAdvance();
if(id==="salary") loadSalary();
}

/* REQUEST SWITCH */
function toggleReq(type){
payBox.style.display = type==="pay" ? "block":"none";
leaveBox.style.display = type==="leave" ? "block":"none";
}

/* ATTENDANCE GROUP */
function loadAttendance(type,btn){

if(btn){
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

fetch(API+"/attendance?staffId="+user._id)
.then(r=>r.json())
.then(res=>{

let data=res.data||[];
let now=new Date();
let map={};

/* GROUP */
data.forEach(a=>{
if(!map[a.date]){
map[a.date]={date:a.date,checkIn:null,checkOut:null,location:null};
}
if(a.checkIn) map[a.date].checkIn=a.checkIn;
if(a.checkOut) map[a.date].checkOut=a.checkOut;
if(a.location) map[a.date].location=a.location;
});

let html="";

Object.values(map).forEach(a=>{

let d=new Date(a.date);
let show=false;

if(type==="today") show=d.toDateString()===now.toDateString();

if(type==="week"){
let s=new Date(now);s.setDate(now.getDate()-now.getDay());
let e=new Date(s);e.setDate(s.getDate()+6);
show=d>=s&&d<=e;
}

if(type==="lastweek"){
let s=new Date(now);s.setDate(now.getDate()-now.getDay()-7);
let e=new Date(s);e.setDate(s.getDate()+6);
show=d>=s&&d<=e;
}

if(type==="month"){
show=d.getMonth()===now.getMonth();
}

if(type==="lastmonth"){
let prev=new Date(now);prev.setMonth(now.getMonth()-1);
show=d.getMonth()===prev.getMonth() &&
     d.getFullYear()===prev.getFullYear();
}

if(show){
html+=`
<div class="card">
${a.date}<br>
🟢 ${a.checkIn||"-"}<br>
🔴 ${a.checkOut||"-"}<br>
📍 ${a.location||"-"}
</div>`;
}

});

attList.innerHTML=html||"No data";

});
}

/* PAYMENT */
function sendPayment(){
fetch(API+"/payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
staffId:user._id,
amount:payAmount.value,
reason:payReason.value
})
});
alert("Payment sent");
}

/* LEAVE */
function sendLeave(){
fetch(API+"/leave",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
staffId:user._id,
from:leaveFrom.value,
to:leaveTo.value,
reason:leaveReason.value
})
});
alert("Leave sent");
}

/* ADVANCE */
function loadAdvance(){
fetch(API+"/payment?staffId="+user._id)
.then(r=>r.json())
.then(res=>{

let html="";

(res.data||[]).forEach(a=>{

let cls="yellow";
if(a.status==="paid") cls="green";
if(a.status==="rejected") cls="red";

html+=`
<div class="card">
₹${a.amount}<br>
<span class="${cls}">${a.status}</span><br>
${new Date(a.createdAt).toLocaleDateString("en-IN")}
</div>`;
});

advList.innerHTML=html||"No advance";

});
}

/* SALARY */
function loadSalary(){

fetch(API+"/staff")
.then(r=>r.json())
.then(res=>{

let staff=(res.data||[]).find(x=>x._id===user._id);

fetch(API+"/payment?staffId="+user._id)
.then(r=>r.json())
.then(p=>{

let total=0;
let history="";

(p.data||[]).forEach(a=>{
if(a.status==="paid"||a.status==="approved"){
total+=Number(a.amount||0);
}

history+=`
<div class="card">
₹${a.amount} - ${a.status}<br>
${new Date(a.createdAt).toLocaleDateString("en-IN")}
</div>`;
});

salaryBox.innerHTML=`
<div class="card">
💵 Salary: ₹${staff?.salary||0}<br>
💰 Advance: ₹${total}<br>
<hr>
🧾 Payable: ₹${(staff?.salary||0)-total}
</div>`;

salaryHistory.innerHTML=history;

});
});
}

/* START */
show('att',document.querySelector('.nav div'));
</script>

</body>
</html>
