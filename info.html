<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(180deg,#e0e7ff,#fff);
}
.container{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:30%;
  background:#f1f5f9;
  padding:15px;
}
.sidebar div{
  padding:12px;
  margin:6px 0;
  background:#e5e7eb;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
}
.sidebar div.active{
  background:#6366f1;
  color:#fff;
}

/* MAIN */
.main{
  width:70%;
  padding:15px;
  overflow:auto;
}
.section{display:none}

.card{
  background:#fff;
  padding:12px;
  border-radius:16px;
  margin:10px 0;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:#fff;
  font-weight:600;
}

/* FILTER */
.filter button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:10px;
  background:#e0e7ff;
}
.filter button.active{
  background:#6366f1;
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div onclick="show('att',this)">📋 Attendance</div>
<div onclick="show('req',this)">📨 Requests</div>
<div onclick="show('adv',this)">💰 Advance</div>
<div onclick="show('salary',this)">💵 Salary</div>
</div>

<div class="main">

<!-- ATTENDANCE -->
<div id="att" class="section">
<h2>Attendance</h2>

<div class="filter">
<button onclick="loadAttendance('today',this)">Today</button>
<button onclick="loadAttendance('week',this)">This Week</button>
<button onclick="loadAttendance('lastweek',this)">Last Week</button>
<button onclick="loadAttendance('month',this)">This Month</button>
<button onclick="loadAttendance('lastmonth',this)">Last Month</button>
</div>

<div id="attList"></div>
</div>

<!-- REQUEST -->
<div id="req" class="section">

<div>
<button onclick="showReq('pay')">Payment Request</button>
<button onclick="showReq('leave')">Leave Request</button>
</div>

<div id="payBox">
<input id="payAmount" class="input" placeholder="Amount">
<input id="payReason" class="input" placeholder="Reason">
<button class="btn" onclick="sendPayment()">Submit</button>
</div>

<div id="leaveBox" style="display:none">
<input id="leaveFrom" type="date" class="input">
<input id="leaveTo" type="date" class="input">
<input id="leaveReason" class="input" placeholder="Reason">
<button class="btn" onclick="sendLeave()">Submit</button>
</div>

</div>

<!-- ADVANCE -->
<div id="adv" class="section">
<h2>Advance</h2>
<div id="advList"></div>
</div>

<!-- SALARY -->
<div id="salary" class="section">
<h2>Salary</h2>
<div id="salaryBox"></div>
</div>

</div>
</div>

<script>
const API="https://levi-api-zhbu.onrender.com";
const user = JSON.parse(sessionStorage.getItem("user"));

/* NAV */
function show(id,el){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.querySelectorAll('.sidebar div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
document.getElementById(id).style.display='block';

if(id==="att") loadAttendance("today");
if(id==="adv") loadAdvance();
if(id==="salary") loadSalary();
}

/* REQUEST SWITCH */
function showReq(type){
payBox.style.display = type==="pay" ? "block":"none";
leaveBox.style.display = type==="leave" ? "block":"none";
}

/* ATTENDANCE */
function loadAttendance(type,btn){

if(btn){
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

fetch(API+"/attendance?staffId="+user._id)
.then(r=>r.json())
.then(res=>{

let data = res.data || [];
let now = new Date();
let html="";

data.forEach(a=>{

let d=new Date(a.date);
let show=false;

if(type==="today") show=d.toDateString()===now.toDateString();

if(type==="week"){
let f=new Date(now);f.setDate(now.getDate()-now.getDay());
let l=new Date(f);l.setDate(f.getDate()+6);
show=d>=f&&d<=l;
}

if(type==="lastweek"){
let f=new Date(now);f.setDate(now.getDate()-now.getDay()-7);
let l=new Date(f);l.setDate(f.getDate()+6);
show=d>=f&&d<=l;
}

if(type==="month"){
show=d.getMonth()===now.getMonth();
}

if(type==="lastmonth"){
let lm=new Date(now.getFullYear(),now.getMonth()-1,1);
show=d.getMonth()===lm.getMonth();
}

if(show){
html+=`
<div class="card">
${a.date}<br>
🟢 In: ${a.checkIn||"-"}<br>
🔴 Out: ${a.checkOut||"-"}<br>
📍 ${a.location||"-"}
</div>`;
}

});

attList.innerHTML = html || "No data";

});
}

/* PAYMENT */
function sendPayment(){
fetch(API+"/payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
staffId:user._id,
amount:payAmount.value,
reason:payReason.value
})
});
alert("Payment sent");
}

/* LEAVE */
function sendLeave(){
fetch(API+"/leave",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
staffId:user._id,
reason:leaveReason.value
})
});
alert("Leave sent");
}

/* ADVANCE */
function loadAdvance(){
fetch(API+"/payment?staffId="+user._id)
.then(r=>r.json())
.then(res=>{
let html="";
(res.data||[]).forEach(a=>{
html+=`<div class="card">₹${a.amount} - ${a.status}</div>`;
});
advList.innerHTML = html || "No advance";
});
}

/* SALARY */
function loadSalary(){
fetch(API+"/staff")
.then(r=>r.json())
.then(res=>{
let staff = res.find(x=>x._id===user._id);

fetch(API+"/payment?staffId="+user._id)
.then(r=>r.json())
.then(p=>{

let total=0;
(p.data||[]).forEach(i=> total+=i.amount);

salaryBox.innerHTML=`
<div class="card">
Salary: ₹${staff.salary}<br>
Advance: ₹${total}<br>
<b>Remaining: ₹${staff.salary-total}</b>
</div>`;

});
});
}

/* START */
show('att',document.querySelector('.sidebar div'));
</script>

</body>
</html>
