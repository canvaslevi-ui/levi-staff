<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Levi Staff Info</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef2ff;
color:#111827;
}

.topnav{
display:flex;
position:sticky;
top:0;
background:#fff;
z-index:99;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.topnav div{
flex:1;
padding:14px 6px;
text-align:center;
font-size:22px;
cursor:pointer;
border-bottom:3px solid transparent;
}

.topnav .active{
border-color:#5b5cf0;
background:#f8f9ff;
}

.wrap{
padding:16px;
max-width:700px;
margin:auto;
}

.section{
display:none;
}

h2{
font-size:22px;
margin-bottom:14px;
}

.card{
background:#fff;
padding:16px;
border-radius:18px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
line-height:1.7;
}

.filter{
display:flex;
gap:8px;
overflow-x:auto;
padding-bottom:8px;
margin-bottom:12px;
}

.filter button{
flex:none;
padding:10px 14px;
border:none;
border-radius:14px;
background:#dfe5ff;
cursor:pointer;
white-space:nowrap;
}

.filter .active{
background:#5b5cf0;
color:#fff;
}

input,textarea,select{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:14px;
margin-bottom:10px;
font-size:16px;
}

.mainbtn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#5b5cf0;
color:#fff;
font-size:16px;
cursor:pointer;
}

.reqtabs{
display:flex;
gap:10px;
margin-bottom:12px;
}

.reqtabs button{
flex:1;
padding:12px;
border:none;
border-radius:14px;
background:#e5e7eb;
cursor:pointer;
}

.reqtabs .active{
background:#5b5cf0;
color:#fff;
}

.green{color:#16a34a;font-weight:700;}
.red{color:#dc2626;font-weight:700;}
.yellow{color:#ca8a04;font-weight:700;}

.small{
font-size:13px;
color:#6b7280;
margin-top:6px;
}

.empty{
text-align:center;
padding:25px;
color:#6b7280;
}

hr{
border:none;
border-top:1px solid #e5e7eb;
margin:10px 0;
}
</style>
</head>

<body>

<div class="topnav">
<div class="active" onclick="showTab('att',this)">📋</div>
<div onclick="showTab('req',this)">📨</div>
<div onclick="showTab('adv',this)">💰</div>
<div onclick="showTab('salary',this)">💵</div>
</div>

<div class="wrap">

<!-- ATTENDANCE -->
<div id="att" class="section" style="display:block">
<h2>Attendance</h2>

<div class="filter">
<button class="active" onclick="loadAttendance('today',this)">Today</button>
<button onclick="loadAttendance('week',this)">Week</button>
<button onclick="loadAttendance('lastweek',this)">Last Week</button>
<button onclick="loadAttendance('month',this)">Month</button>
<button onclick="loadAttendance('lastmonth',this)">Last Month</button>
</div>

<div id="attList"></div>
</div>

<!-- REQUEST -->
<div id="req" class="section">
<h2>Requests</h2>

<div class="reqtabs">
<button id="payBtn" class="active" onclick="reqMode('pay')">Payment</button>
<button id="leaveBtn" onclick="reqMode('leave')">Leave</button>
</div>

<div id="payBox">
<input id="payAmount" placeholder="Amount">
<textarea id="payReason" placeholder="Reason"></textarea>

<select id="payType">
<option value="Cash">Cash</option>
<option value="Online">Online</option>
<option value="UPI">UPI</option>
<option value="Bank Transfer">Bank Transfer</option>
</select>

<button class="mainbtn" onclick="sendPayment()">Submit Payment</button>
</div>

<div id="leaveBox" style="display:none">
<input type="date" id="leaveFrom">
<input type="date" id="leaveTo">
<textarea id="leaveReason" placeholder="Reason"></textarea>
<button class="mainbtn" onclick="sendLeave()">Submit Leave</button>
</div>
</div>

<!-- ADVANCE -->
<div id="adv" class="section">
<h2>Advance</h2>
<div id="advList"></div>
</div>

<!-- SALARY -->
<div id="salary" class="section">
<h2>Salary</h2>
<div id="salaryBox"></div>
<div id="salaryHistory"></div>
</div>

</div>

<script>
const API="https://levi-api-zhbu.onrender.com";
const user=JSON.parse(sessionStorage.getItem("user")||"{}");

/* NAV */
function showTab(id,el){
document.querySelectorAll(".section").forEach(x=>x.style.display="none");
document.querySelectorAll(".topnav div").forEach(x=>x.classList.remove("active"));
document.getElementById(id).style.display="block";
el.classList.add("active");

if(id==="att") loadAttendance("today");
if(id==="adv") loadAdvance();
if(id==="salary") loadSalary();
}

/* REQUEST MODE */
function reqMode(type){
payBox.style.display=type==="pay"?"block":"none";
leaveBox.style.display=type==="leave"?"block":"none";

payBtn.classList.remove("active");
leaveBtn.classList.remove("active");

if(type==="pay") payBtn.classList.add("active");
if(type==="leave") leaveBtn.classList.add("active");
}
function loadAttendance(type,btn){

if(btn){
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

fetch(API+"/attendance?staffId="+user._id)
.then(r=>r.json())
.then(res=>{

let data=res.data||[];
let grouped={};
let now=new Date();

data.forEach(a=>{

let key=a.date;

if(!grouped[key]){
grouped[key]={
date:key,
checkIn:"-",
checkOut:"-",
location:"-"
};
}

if(a.checkIn) grouped[key].checkIn=a.checkIn;
if(a.checkOut) grouped[key].checkOut=a.checkOut;
if(a.location) grouped[key].location=a.location;

});

let html="";

Object.values(grouped)
.sort((a,b)=>new Date(b.date)-new Date(a.date))
.forEach(a=>{

let d=new Date(a.date);
let show=false;

if(type==="today"){
show=d.toDateString()===now.toDateString();
}

if(type==="week"){
let s=new Date(now);
s.setDate(now.getDate()-now.getDay());
let e=new Date(s);
e.setDate(s.getDate()+6);
show=d>=s&&d<=e;
}

if(type==="lastweek"){
let s=new Date(now);
s.setDate(now.getDate()-now.getDay()-7);
let e=new Date(s);
e.setDate(s.getDate()+6);
show=d>=s&&d<=e;
}

if(type==="month"){
show=d.getMonth()===now.getMonth() &&
d.getFullYear()===now.getFullYear();
}

if(type==="lastmonth"){
let p=new Date(now);
p.setMonth(now.getMonth()-1);
show=d.getMonth()===p.getMonth() &&
d.getFullYear()===p.getFullYear();
}

if(show){

html+=`
<div class="card">
<b>${a.date}</b><br>
🟢 In: ${a.checkIn}<br>
🔴 Out: ${a.checkOut}<br>
<div class="small">📍 ${a.location}</div>
</div>`;

}

});

attList.innerHTML=html || `<div class="card empty">No attendance data</div>`;

});
}

/* SEND PAYMENT */
function sendPayment(){

fetch(API+"/payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
staffId:user._id,
amount:payAmount.value,
reason:payReason.value,
payType:payType.value
})
})
.then(()=>{
alert("Payment request sent");
payAmount.value="";
payReason.value="";
payType.value="Cash";
});
}

/* SEND LEAVE */
function sendLeave(){

fetch(API+"/leave",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
staffId:user._id,
from:leaveFrom.value,
to:leaveTo.value,
reason:leaveReason.value
})
})
.then(()=>{
alert("Leave request sent");
leaveFrom.value="";
leaveTo.value="";
leaveReason.value="";
});
}

/* ADVANCE */
function loadAdvance(){

fetch(API+"/payment?staffId="+user._id)
.then(r=>r.json())
.then(res=>{

let list=res.data||[];

if(list.length===0){
advList.innerHTML=`<div class="card empty">No advance records</div>`;
return;
}

let html="";

list.reverse().forEach(a=>{

let cls="yellow";
if(a.status==="paid") cls="green";
if(a.status==="rejected") cls="red";

html+=`
<div class="card" style="display:flex;gap:18px;flex-wrap:wrap;align-items:center;">
<span>₹${a.amount}</span>
<span>|</span>
<span class="${cls}">${a.status||"pending"}</span>
<span>|</span>
<span>${new Date(a.createdAt).toLocaleDateString("en-IN")}</span>
<span>|</span>
<span>${a.payType||"Cash"}</span>
</div>`;
});

advList.innerHTML=html;

});
}

/* SALARY */
function loadSalary(){

fetch(API+"/staff")
.then(r=>r.json())
.then(res=>{

let staff=(res.data||[]).find(x=>x._id===user._id);

fetch(API+"/payment?staffId="+user._id)
.then(r=>r.json())
.then(p=>{

let payments=p.data||[];

let paid=0;
let pending=0;
let rejected=0;

payments.forEach(a=>{

let amt=Number(a.amount||0);

if(a.status==="paid"){
paid+=amt;
}
else if(a.status==="rejected"){
rejected+=amt;
}
else{
pending+=amt;
}

});

let salary=Number(staff?.salary||0);
let payable=salary-paid;

salaryBox.innerHTML=`
<div class="card">
💵 Salary: ₹${salary}<br>
🟢 Paid Advance: ₹${paid}<br>
🟡 Pending: ₹${pending}<br>

<hr>
🧾 Payable Now: ₹${payable}
</div>`;

salaryHistory.innerHTML="";   // 👈 remove down side advance list

});
});
}

/* START */
loadAttendance("today");
</script>

</body>
</html>
