<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Levi Interior — Staff Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

body{
  margin:0;
  font-family:'SF Pro Display',sans-serif;
  background:linear-gradient(180deg,#e0e7ff 0%,#fff 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  background:white;
  border-radius:28px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  padding:30px 20px;
  text-align:center;
}

/* LOGO */
.logo{
  width:100px;
  border-radius:20px;
  background:#2563eb;
  padding:4px;
}

/* TITLE */
h1{
  margin:15px 0;
  font-weight:700;
}

.subtitle{
  color:#64748b;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #e2e8f0;
  margin-top:10px;
  font-size:15px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  font-weight:600;
  margin-top:10px;
  cursor:pointer;
  background:#2563eb;
  color:white;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.03);
}

/* RESULT */
.result{
  margin-top:10px;
  font-size:14px;
}

/* WELCOME */
.welcome{
  display:none;
}

footer{
  margin-top:20px;
  font-size:13px;
  color:#64748b;
}
</style>
</head>

<body>

<div class="card">

<img src="https://i.imgur.com/284Ol04.jpeg" class="logo">
<h1>Levi Interior</h1>
<div class="subtitle">Staff Login Portal</div>

<div id="form">

<input id="mobile" placeholder="Enter Mobile Number">

<button class="btn" onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none">
<input id="otp" placeholder="Enter OTP">
<button class="btn" onclick="verifyOTP()">Verify OTP</button>
</div>

<div id="msg" class="result"></div>

</div>

<div id="welcome" class="welcome">
<h2 id="welcomeText"></h2>
<p>Redirecting...</p>
</div>

<footer>© Levi Interior</footer>

</div>

<script>
const API="https://levi-api-zhbu.onrender.com";

let users=[],otp,user;

/* LOAD USERS */
fetch(API+"/staff")
.then(r=>r.json())
.then(d=>users=d.data);

/* SEND OTP */
function sendOTP(){
let m=document.getElementById("mobile").value;

user=users.find(u=>u.mobile==m);

if(!user){
msg.innerText="❌ Not authorized";
return;
}

otp=Math.floor(100000+Math.random()*900000);

msg.innerHTML="OTP : <b>"+otp+"</b>";
otpBox.style.display="block";
}

/* VERIFY */
function verifyOTP(){
if(document.getElementById("otp").value==otp){

sessionStorage.setItem("user",JSON.stringify(user));

document.getElementById("form").style.display="none";
document.getElementById("welcome").style.display="block";
document.getElementById("welcomeText").innerText="Welcome "+user.name;

setTimeout(()=>{
location.href="index.html";
},2000);

}else{
msg.innerText="❌ Invalid OTP";
}
}
</script>

</body>
</html>
